<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcomments Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 40px;

    .container {
      max-width: 800px;
      margin: auto;

      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);

      margin-top: 0;
    }

      margin-top: 40px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Blog Post Title</h1>

  <p>
    This is an example page showing how to integrate a comment system
    using Welcomments on a plain HTML website.
  </p>

  <p>
    Try posting a comment below to test if everything works correctly.
  </p>

  <h2>Comments</h2>

  <!-- Welcomments container -->
  <div id="welcomments__container"></div>

</div>

<!-- Welcomments script -->
<script async src="https://cdn.welcomments.io/welcomments.js"></script>

<script>
window.WELCOMMENTS = {
  websiteId: "pWqmNYVsxWmKCoDBWcZcGatC0",
  pageId: window.location.pathname,
  pageTitle: document.title
};
</script>

</body>
</html>
